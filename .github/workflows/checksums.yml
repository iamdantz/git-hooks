name: Generate Checksums

on:
    push:
        branches:
            - main
        paths:
            - "**.sh"

permissions:
    contents: write

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Calculate SHA256
              run: |
                  find . -type f -name "*.sh" -exec sha256sum {} + > checksums.sha256

            - name: Commit & Push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add checksums.sha256

                  git diff-index --quiet HEAD || (git commit -m "chore(security): auto-update checksums.sha256 [skip ci]" && git push)
